<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cafe Curator</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☕️</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header">
    <h1>Cafe Curator</h1>
    <p>Swipe right to save · Swipe left to skip</p>
  </div>

  <div class="btn-group">
    <button class="btn primary" onclick="getLocation()">Find Cafes Near Me</button>
    <button class="btn secondary" onclick="showSaved()">Saved Cafes</button>
  </div>

  <div id="status" class="status"></div>

  <div class="cards" id="cards"></div>

  <div id="saved-section" class="saved-section hidden">
    <h2> Saved Cafes</h2>
    <ul id="saved-list"></ul>
    <button class="btn secondary" onclick="hideSaved()">✕ Close</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
